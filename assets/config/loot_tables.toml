# Loot Tables — Carapace Biological Economy
#
# The world of Carapace runs on two currencies:
# - Telomerase Fluid (harvested from Carapace and vampires)
# - Sanguis / human blood (in vacuum-sealed old-world canisters)
#
# Loot tables reflect the biology-driven dark sci-fi setting:
# creature drops yield biological components, dungeon loot includes
# pre-collapse artifacts, and currency is always telomerase or sanguis.

