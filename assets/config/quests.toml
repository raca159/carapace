[[quest_template]]
id = "hunt_creature"
name_pattern = "Hunt the {target}"
description_pattern = "A {target} has been terrorizing the area. Slay it."
objective_type = "kill"
target_tags = ["BEAST", "AGGRESSIVE"]
reward_tags = ["HERB_MEDICINAL", "COMMON"]

[[quest_template]]
id = "gather_resource"
name_pattern = "Gather {resource}"
description_pattern = "We need {resource} for our supplies. Bring us some."
objective_type = "collect"
target_tags = ["ORE_IRON", "STONE_BLOCK", "HERB_MEDICINAL"]
required_count = 3
reward_tags = ["METAL", "UNCOMMON"]

[[quest_template]]
id = "clear_area"
name_pattern = "Clear the {biome}"
description_pattern = "Dangerous creatures infest the {biome}. Clear them out."
objective_type = "kill_area"
target_tags = ["UNDEAD", "BEAST"]
biome_tags = ["BIOME_SWAMP", "BIOME_TUNDRA"]
kill_count = 3
reward_tags = ["EQUIP_ARMOR", "UNCOMMON"]

[[quest_template]]
id = "explore_biome"
name_pattern = "Explore the {biome}"
description_pattern = "Journey to the {biome} and discover its secrets."
objective_type = "reach"
target_tags = ["LANDMARK"]
biome_tags = ["BIOME_ANCIENT_VAULT", "BIOME_CRYSTALLINE_CAVERN"]
reward_tags = ["ARTIFACT", "RARE"]

# ─── NEW: Narratively-driven quest templates ─────────────────────────────────
# Added per CAR-394: Quest tension (lens 7), procedural templates (lens 6),
# and faction-voice descriptions (lens 3).

[[quest_template]]
id = "eliminate_corrupted"
name_pattern = "Put Down the {target}"
description_pattern = "The {target} was human once — before the Enzyme rewrote them. Now they haunt the periphery, wearing an old friend's face. A clean death is more than they'd offer you."
objective_type = "kill"
target_tags = ["HUMANOID", "ADDICTED"]
reward_tags = ["EQUIP_WEAPON", "UNCOMMON"]
required_count = 1

[[quest_template]]
id = "rescue_captives"
name_pattern = "Rescue Survivors from the {biome}"
description_pattern = "A scavenger party was taken in the {biome}. Some may still be alive. The settlement has already written them off — but you haven't. Every hour you wait, the trail grows colder."
objective_type = "kill_area"
target_tags = ["SANGUINE", "AGGRESSIVE", "HUMANOID"]
biome_tags = ["BIOME_TEMPERATE_FOREST", "BIOME_SWAMP", "BIOME_MOUNTAIN"]
kill_count = 5
reward_tags = ["EQUIP_ARMOR", "RARE"]

[[quest_template]]
id = "recover_stolen_artifact"
name_pattern = "Recover the {resource}"
description_pattern = "A pre-Collapse {resource} was unearthed in the ruins, then stolen before it could be secured. It could change everything — or it could be worthless. Either way, it doesn't belong to the things that took it."
objective_type = "collect"
target_tags = ["ARTIFACT", "ENERGY", "RARE"]
required_count = 1
reward_tags = ["ARTIFACT", "EPIC"]

[[quest_template]]
id = "clear_nest"
name_pattern = "Clear the {biome} Nest"
description_pattern = "Something has been building in the {biome}. The scout described 'a cathedral of chitin and bone.' The structure is growing. Every day we wait, it spreads. Burn it before it takes root."
objective_type = "kill_area"
target_tags = ["CARAPACE", "HAS_CHITIN", "AGGRESSIVE"]
biome_tags = ["BIOME_TEMPERATE_FOREST", "BIOME_BOREAL_FOREST", "BIOME_SWAMP"]
kill_count = 4
reward_tags = ["EQUIP_WEAPON", "RARE"]

[[quest_template]]
id = "scout_missing_patrol"
name_pattern = "Scout the {biome}"
description_pattern = "The patrol that watches the {biome} has gone silent. We don't know if it was Carapace, vampires, or something worse. Find out what happened — but don't engage unless you have to. Dead scouts tell no tales."
objective_type = "reach"
target_tags = ["LANDMARK"]
biome_tags = ["BIOME_MOUNTAIN", "BIOME_TUNDRA", "BIOME_VOLCANIC"]
reward_tags = ["EQUIP_ACCESSORY", "UNCOMMON"]

[[quest_template]]
id = "hunt_alpha_predator"
name_pattern = "Hunt the Alpha {target}"
description_pattern = "A pack of {target} has learned to hunt our hunting parties. They avoid traps, circle behind, wait for the weak. There's an alpha leading them — something smarter than the rest. Kill it. The pack will scatter or starve."
objective_type = "kill"
target_tags = ["CARNIVORE", "AGGRESSIVE"]
reward_tags = ["HERB_MEDICINAL", "RARE"]
required_count = 1

[[quest_template]]
id = "gather_fever_cure"
name_pattern = "Gather Medicinal {resource}"
description_pattern = "A fever is spreading through the settlement. The children are coughing blood. We need {resource} to make the tincture, but the only source grows deep in contaminated soil. Bring enough to treat everyone — and don't get scratched."
objective_type = "collect"
target_tags = ["HERB_MEDICINAL"]
required_count = 5
reward_tags = ["METAL", "COMMON"]

# ─── FACTION-SPECIFIC QUESTS ──────────────────────────────────────────────
# Added per CAR-3: Faction voice (lens 3), History as texture (lens 6),
# Dark wonder (lens 4), Density over volume (lens 5)

[[quest_template]]
id = "reclaim_vault_data"
name_pattern = "Reclaim Vault Data from the {biome}"
description_pattern = "A Remnant archivist tracked a pre-Collapse server core to the {biome}, but the facility is infested. The data could contain gene-therapy protocols — real medicine, not cult poison. We need the storage cylinder. The machines can keep the rest."
objective_type = "collect"
target_tags = ["ARTIFACT", "ELECTRONIC"]
required_count = 1
reward_tags = ["EQUIP_ACCESSORY", "RARE"]
biome_tags = ["BIOME_ANCIENT_VAULT", "BIOME_MOUNTAIN"]

[[quest_template]]
id = "silence_construct"
name_pattern = "Silence the {target}"
description_pattern = "An automated security unit in the {biome} has been broadcasting a distress signal for seventy years. The signal attracts Carapace — and worse. We need someone to reach its maintenance access and terminate the transmitter. It will defend itself. They all do."
objective_type = "kill"
target_tags = ["CONSTRUCT", "MINDLESS"]
reward_tags = ["ARTIFACT", "UNCOMMON"]
required_count = 1
biome_tags = ["BIOME_ANCIENT_VAULT", "BIOME_TUNDRA", "BIOME_MOUNTAIN"]

[[quest_template]]
id = "intercept_sanguine_courier"
name_pattern = "Intercept the Sanguine Courier"
description_pattern = "A vampire courier is moving through the {biome} with a sealed manifest of House {house_name}. The contents could shift the balance between the noble houses. The settlement wants that manifest — and the courier is secondary. A dead courier tells no tales, but their documents tell everything."
objective_type = "kill_area"
target_tags = ["SANGUINE", "HUMANOID", "AGGRESSIVE"]
kill_count = 2
reward_tags = ["TELOMERASE", "RARE"]
biome_tags = ["BIOME_TEMPERATE_FOREST", "BIOME_SHRUBLAND", "BIOME_GRASSLAND"]

[[quest_template]]
id = "close_trench_leak"
name_pattern = "Close the Trench Leak in the {biome}"
description_pattern = "A fissure has opened in the {biome}, leaking raw telomerase into the water table. The Carapace are already swarming to it. The settlement needs the fissure sealed — collapsed, flooded, or buried. The Carapace will not surrender their new spawning ground without a fight."
objective_type = "kill_area"
target_tags = ["CARAPACE", "HAS_CHITIN", "AGGRESSIVE"]
kill_count = 6
reward_tags = ["EQUIP_WEAPON", "RARE"]
biome_tags = ["BIOME_SWAMP", "BIOME_TEMPERATE_FOREST", "BIOME_MOUNTAIN"]

[[quest_template]]
id = "cult_sabotage_supply"
name_pattern = "Sabotage the Familiar Supply Line"
description_pattern = "The Familiars are moving a shipment of diluted Enzyme through the {biome} to a forward ritual site. Without it, the local cult loses its grip on the flock. Destroy the shipment. Kill the couriers. Let the addicts feel the withdrawal and remember why they hate their masters."
objective_type = "kill_area"
target_tags = ["FAMILIAR", "HUMANOID", "ADDICTED"]
kill_count = 4
reward_tags = ["CHITIN", "UNCOMMON"]
biome_tags = ["BIOME_SHRUBLAND", "BIOME_TEMPERATE_FOREST", "BIOME_DESERT"]

[[quest_template]]
id = "sample_mutation"
name_pattern = "Sample {biome} Mutation"
description_pattern = "A free humanity biologist is cataloging telomerase mutations in the {biome}. They need tissue samples from at least {kill_count} distinct mutant specimens — alive enough to culture, dead enough to carry. The mutations are accelerating. This may be our last chance to document the baseline."
objective_type = "kill_area"
target_tags = ["MUTANT", "AGGRESSIVE"]
kill_count = 5
reward_tags = ["HERB_MEDICINAL", "EPIC"]
biome_tags = ["BIOME_SWAMP", "BIOME_TROPICAL_FOREST", "BIOME_VOLCANIC"]

[[quest_template]]
id = "safe_passage_remnant"
name_pattern = "Escort the Remnant Convoy to {biome}"
description_pattern = "A Remnant convoy is attempting to reach a pre-Collapse bunker in the {biome}. They carry cryo-tech that could awaken more survivors — but every faction wants it. The vampires want the tech. The Familiars want the untainted blood. The Carapace just want everything organic. Keep the convoy alive."
objective_type = "kill_area"
target_tags = ["HUMANOID", "AGGRESSIVE"]
kill_count = 8
reward_tags = ["EQUIP_ARMOR", "EPIC"]
biome_tags = ["BIOME_TEMPERATE_FOREST", "BIOME_MOUNTAIN", "BIOME_TUNDRA"]

