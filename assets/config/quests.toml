[[quest_template]]
id = "hunt_creature"
name_pattern = "Hunt the {target}"
description_pattern = "A {target} has been terrorizing the area. Slay it."
objective_type = "kill"
target_tags = ["BEAST", "AGGRESSIVE"]
reward_tags = ["HERB_MEDICINAL", "COMMON"]

[[quest_template]]
id = "gather_resource"
name_pattern = "Gather {resource}"
description_pattern = "We need {resource} for our supplies. Bring us some."
objective_type = "collect"
target_tags = ["ORE_IRON", "STONE_BLOCK", "HERB_MEDICINAL"]
required_count = 3
reward_tags = ["METAL", "UNCOMMON"]

[[quest_template]]
id = "clear_area"
name_pattern = "Clear the {biome}"
description_pattern = "Dangerous creatures infest the {biome}. Clear them out."
objective_type = "kill_area"
target_tags = ["UNDEAD", "BEAST"]
biome_tags = ["BIOME_SWAMP", "BIOME_TUNDRA"]
kill_count = 3
reward_tags = ["EQUIP_ARMOR", "UNCOMMON"]

[[quest_template]]
id = "explore_biome"
name_pattern = "Explore the {biome}"
description_pattern = "Journey to the {biome} and discover its secrets."
objective_type = "reach"
target_tags = ["LANDMARK"]
biome_tags = ["BIOME_ANCIENT_VAULT", "BIOME_CRYSTALLINE_CAVERN"]
reward_tags = ["ARTIFACT", "RARE"]

# ─── NEW: Narratively-driven quest templates ─────────────────────────────────
# Added per CAR-394: Quest tension (lens 7), procedural templates (lens 6),
