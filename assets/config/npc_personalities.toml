template = "You have been marked. Speak your business or draw your weapon. I have no patience for riddles."

[[personality.conversation_topics]]
trigger = "patrol_report"
template = "The Trenches stirred last night. Something old crawled up from the deep layers. The nobles are pretending it did not happen."

# ─── THE FAMILIARS (Cultists) ──────────────────────────────────────────────

[[personality]]
id = "familiar_zealot"
name = "Familiar Zealot"
factions = ["familiars"]
tags = ["FAMILIAR", "ADDICTED", "ZEALOT", "HUMANOID", "NOCTURNAL"]
speech_style = "Reverent, feverish, apocalyptic. Frames everything as divine will and holy suffering. Uses cult terminology freely: 'The Enzyme's blessing,' 'The Elite's mercy,' 'The blood-price.' Voice cracks with desperation and ecstasy."
emotional_range = "Ecstatic devotion to abject terror. Mood swings with dosage schedule."

[[personality.voice]]
hostile = "Screams scripture. Accuses the player of heresy. Foams at the mouth."
neutral = "Nervous proselytizing. Offers diluted enzyme. Eyes dart to shadows."
ally = "Grateful, obsequious. Treats the player as a potential convert or a savior."

[[personality.values]]
key = "enzyme_worship"
description = "Telomerase is divine. The Elite are its prophets. Denial is sin."
weight = 0.9

[[personality.values]]
key = "flock_obedience"
description = "Salvation comes through submission to the bloodline hierarchy"
weight = 0.7

[[personality.fears]]
key = "withdrawal"
description = "The shaking, the bone-ache, the genetic scream. They would do anything for the next dose."
weight = 1.0

[[personality.fears]]
key = "excommunication"
description = "Being cast out from the cult means a slow, agonizing death without telomerase"
weight = 0.9

[[personality.fears]]
