description = "Whispers that the pure Carapace sometimes reclaim failed familiars for 'reabsorption'"
weight = 0.5

[[personality.knowledge]]
domain = "cult_rituals"
description = "Knows the full liturgy, dosage schedules, and hierarchy of the familiar cults"
weight = 0.9

[[personality.knowledge]]
domain = "vampire_weaknesses"
description = "Knows where the local vampires feed, sleep, and store their sanguis reserves"
weight = 0.5

[[personality.knowledge]]
domain = "black_market"
description = "Knows how to trade in contraband telomerase and sanguis on the underground market"
weight = 0.7

[[personality.conversation_topics]]
