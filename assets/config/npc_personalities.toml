template = "I remember when we built this hall. Twenty-two of us, hauling stones from the old highway. Three died under collapsed scaffolding. We buried them where the altar now stands. That is what this place is built on: the bones of the people who refused to leave."

[[personality.conversation_topics]]
trigger = "old_world_reminiscence"
template = "I was six years old when the Collapse happened. I remember the sky turning the color of an old bruise. I remember my mother dragging me into the cellar. I remember the screaming from outside. The rest is silence. You learn to live in the silence."

[[personality.conversation_topics]]
trigger = "warning_advice"
template = "You carry yourself like someone looking for something. I have seen that look before. It either ends in a shallow grave or a throne. Either way, there is no middle ground out here."

