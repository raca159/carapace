speech_style = "Arrogant, impulsive, cruel with the casualness of youth. Recently turned — still adjusting to the new senses, the new hunger, the new hierarchy. Alternates between bravado and moments of existential terror. Teeth are not fully formed chitin yet; gums still bleed when they eat."
