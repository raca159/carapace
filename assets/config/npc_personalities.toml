template = "Have you felt the Enzyme's touch, wanderer? The thirst that only the divine blood can quench? I can show you the path."

[[personality.conversation_topics]]
trigger = "withdrawal_plea"
template = "Please — you carry the scent. I can smell it on you. A vial. Just a finger's worth. I have money. I have information. Anything."

[[personality.conversation_topics]]
trigger = "cult_warning"
template = "The Enforcers came through last night. Looking for a defector. They said the Trench would digest them slowly. I did not see them find who they sought."

