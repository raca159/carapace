# Entity Templates — Carapace Biology-Driven Creature Definitions
#
# Each template defines an archetype grounded in the Carapace universe:
# - The Great Carapace (giant crustacean monsters, pure telomerase producers)
# - The Sanguine Elite (vampires, human-crustacean hybrids)
# - The Familiars (infected human cultists, addicted to telomerase)
# - Free Humans (remnant survivors, hunters, guards)
# - Mutated Beasts (wildlife corrupted by the biological spill)
# - Ancient Constructs (pre-collapse machines, broken security systems)

