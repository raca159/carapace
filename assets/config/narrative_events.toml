# Narrative Events — Carapace Dark Bio-Sci-Fi
#
# Environmental narrative triggers that fire when specific
# biological or technological conditions are met.
# Tone: grim, atmospheric, grounded in biological horror.

[[narrative_event]]
id = "pack_hunt"
trigger = { entity_tags = ["PACK_ANIMAL", "CARNIVORE"], nearby_tags = ["BLOOD"] }
message = "A low growl rises from the darkness — the pack has caught the scent. Coordinated clicks echo through the tunnels as they begin to flank."
chance = 0.25
cooldown_ticks = 60

[[narrative_event]]
id = "swarm_feeding_frenzy"
trigger = { entity_tags = ["SWARM", "AGGRESSIVE"], nearby_tags = ["FLESH"] }
message = "The swarm converges on exposed tissue with mechanical precision — thousands of tiny mandibles clicking in overlapping percussion."
chance = 0.3
cooldown_ticks = 50

[[narrative_event]]
id = "aerial_lure"
trigger = { entity_tags = ["FLIGHT", "LUMINESCENT"], nearby_tags = ["OPAQUE", "DARK"] }
message = "Bioluminescent patterns pulse overhead — a moth-spiral of coded light drifts through the darkness like a memory of stars."
chance = 0.15
cooldown_ticks = 80

[[narrative_event]]
id = "deep_tremor"
trigger = { entity_tags = ["LARGE", "SLOW"], nearby_tags = ["HARD"] }
message = "The ground shudders. A rhythmic impact — slow, heavy, deliberate — resonates through the stone. Something massive is approaching."
chance = 0.15
cooldown_ticks = 90

[[narrative_event]]
id = "enzyme_combustion"
trigger = { entity_tags = ["TELOMERASE_INFUSED"], nearby_tags = ["FLAMMABLE", "HOT"] }
message = "Raw telomerase ignites with a violent hiss — the air fills with the acrid stench of burning enzyme, leaving shimmering residue on the walls."
chance = 0.2
cooldown_ticks = 60

[[narrative_event]]
id = "crystal_resonance"
trigger = { entity_tags = ["CRYSTAL"], nearby_tags = ["LUMINESCENT", "HARD"] }
message = "The crystals hum at the edge of hearing — a resonant frequency that vibrates in the teeth and rattles the bones of the skull."
chance = 0.15
cooldown_ticks = 70

[[narrative_event]]
id = "cryo_pod_failure"
trigger = { entity_tags = ["CRYO_REMNANT"], nearby_tags = ["COLD", "ARTIFACT"] }
message = "A stasis pod's seals crack, venting centuries-old gas. Inside, a desiccated form twitches — something in the cryo-fluid has kept it alive."
chance = 0.1
cooldown_ticks = 120

[[narrative_event]]
id = "fearless_charge"
trigger = { entity_tags = ["FEARLESS", "AGGRESSIVE"], health_percent = 0.3 }
message = "Wounded beyond reason, the creature charges anyway — pain has been overwritten by enzymatic fury. It will not stop."
chance = 0.3
cooldown_ticks = 50

[[narrative_event]]
id = "territorial_display"
trigger = { entity_tags = ["TERRITORIAL", "CARAPACE"], nearby_tags = ["HUMAN", "HUMANOID"] }
message = "The creature scrapes its claws across the chitinous walls, spraying sparks — a warning display older than human language."
chance = 0.2
cooldown_ticks = 55

[[narrative_event]]
id = "withdrawal_collapse"
trigger = { entity_tags = ["FAMILIAR", "ADDICTED"], health_percent = 0.25 }
message = "The familiar convulses violently, foam streaked with telomerase residue bubbling from cracked lips. The withdrawal is shutting them down from the inside."
chance = 0.25
cooldown_ticks = 80

[[narrative_event]]
id = "wasteland_triage"
trigger = { entity_tags = ["HUMAN", "HEALING"], nearby_tags = ["FLESH", "BLOOD"] }
message = "A field medic kneels in the rubble, hands steady as they suture a wound with salvaged bio-gel. 'Hold still. I've seen worse.'"
chance = 0.15
cooldown_ticks = 70

[[narrative_event]]
id = "subdermal_writhe"
trigger = { entity_tags = ["HAS_CHITIN", "SANGUINE"], nearby_tags = ["ARTIFACT"] }
message = "The hybrid's subdermal plates ripple in response to the artifact's energy field — an involuntary rejection response from the crustacean genome."
chance = 0.2
cooldown_ticks = 65

