# Encounters — Carapace World Encounters
#
# Random encounters that can occur while traveling the overworld.
# Each encounter is selected by weighted random roll when the player moves.
# The spawn groups define which creatures and items appear for each type.
#
# Encounter system: 15% base chance per tile; higher risk at night,
# in hostile biomes (swamp, volcanic), and near faction territory.

# ─── TRAVELING MERCHANT ────────────────────────────────────────────────────────
# A weathered merchant who travels the wasteland with salvaged goods. Friendly.
# Rare encounter, typically near settlements or roads.

[[encounter]]
id = "merchant"
name = "Traveling Merchant"
description = "A weathered merchant with a cart laden with salvaged pre-Collapse goods."
weight = 8
min_distance = 6

[[encounter.spawn]]
name = "Traveling Merchant"
glyph = "M"
color = [255, 200, 50]
tags = ["HUMAN", "MEDIUM", "PEACEFUL", "HUMANOID"]
health = 30
count = 1

[[encounter.loot]]
name = "Dried Rations"
glyph = "%"
color = [180, 140, 80]
tags = ["EDIBLE", "FOOD", "COMMON"]
count = 3

[[encounter.loot]]
name = "Old-World Bandage"
glyph = "!"
color = [220, 220, 220]
tags = ["MEDICAL", "HEALING", "COMMON"]
