[[relationship]]
faction_a = "dark_market"
faction_b = "great_carapace"
standing = "neutral"
# The Market trades with Carapace proxies for raw enzyme, but the deep-trench horrors are too alien for direct commerce.

[[relationship]]
faction_a = "dark_market"
faction_b = "sanguine_elite"
standing = "neutral"
# Both sides benefit from the blood trade. The Elite tolerate the Market as a useful distribution channel.

[[relationship]]
faction_a = "dark_market"
faction_b = "free_humanity"
standing = "neutral"
# The Market sells to everyone, including Free Humanity — at a premium. Survival is business.

[[relationship]]
faction_a = "dark_market"
faction_b = "the_remnant"
standing = "neutral"
# The Remnant's old-world artifacts fetch the highest prices. The Market protects its supply lines.

[[relationship]]
faction_a = "dark_market"
faction_b = "ancient_machines"
standing = "neutral"
# The machines ignore the Market unless they trespass on protected installations.

[[relationship]]
faction_a = "player"
faction_b = "dark_market"
standing = "neutral"
# The Market deals with anyone who can pay.
