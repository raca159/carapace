# Shared glyph definitions for both render pipelines.
# Each glyph entry defines:
#   - char:  The UNICODE character used in terminal mode
#   - bitmap: 12 rows × 8-bit binary masks (1 = opaque, 0 = transparent,
#             left-to-right, MSB to LSB; row 0 = top)
#   - default_color: RGB color hint (used when no entity/tile-level color is set)
#
# Design lenses: readability under constraints, density over volume,
# faction voice, biological grimdark, dark wonder.

