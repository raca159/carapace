faction_source = "the_remnant"
title_template = "Archival Log {log_id}: Bunker Protocol Activation"
content_template = "DECLASSIFIED: On the day of the Collapse, forty-seven hardened bunkers sealed their blast doors. Inside: military personnel, research staff, and what the government called 'essential genetic material.' The doors were designed to open after five years. They did not open. The occupants, faced with a surface still dead, extended their isolation. Generations passed. The keys to the doors were lost. What emerged decades later was not the same humanity that entered."
discovery_tags = ["CONSTRUCT", "PRE_COLLAPSE", "ARTIFACT"]
discovery_context = "vault_discovery"
persistence = true

