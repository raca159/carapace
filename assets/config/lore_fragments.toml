[[lore_fragment]]
id = "the_enzyme_wars"
category = "ancient_event"
rarity = "epic"
faction_source = "sanguine_elite"
title_template = "The Enzyme Wars: An Oral History (Redacted)"
content_template = "The Sanguine Elite do not speak of the Enzyme Wars. Not because they lost — but because they won. House {house_name} and House {rival_house} turned the wasteland into a battlefield over control of the remaining telomerase refinement facilities. The war lasted eleven years and depopulated three sectors. The victor absorbed the vanquished. The facilities were destroyed in the final siege. Now both Houses share the same shortage. They do not discuss the irony."
discovery_tags = ["SANGUINE", "SOCIAL", "DECEPTIVE"]
discovery_context = "house_confession"
