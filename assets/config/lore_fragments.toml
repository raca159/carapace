[[lore_fragment]]
id = "cell_battery_tech"
category = "technology"
rarity = "common"
faction_source = "free_humanity"
title_template = "On the Nature of 'Cell Batteries'"
content_template = "The old-world power cells hold a charge for decades, sometimes centuries. The settlements call them 'frozen lightning.' They are found in ruins, still humming, still waiting to be useful. A single cell can power a plasma cutter, a security door, or — if you believe the stories — a whole building. No one knows how to make new ones."
discovery_tags = ["ARTIFACT", "ENERGY"]
discovery_context = "item_inspection"
persistence = true

# ─── LOCATION LORE ─────────────────────────────────────────────────────────

[[lore_fragment]]
id = "trench_geography"
category = "location_lore"
rarity = "rare"
faction_source = "great_carapace"
title_template = "The Trench-Layers: A Descent Guide"
content_template = "The Trenches descend in layers. Layer One: the spill-zone, where diluted telomerase filters into groundwater. Layer Two: the nest-chambers, where Carapace broods gestate. Layer Three: the deep dark, where the Old Ones rest. No human has returned from Layer Four. The Carapace have no word for it because they have no need to name what they already own."
discovery_tags = ["CARAPACE", "AQUATIC", "LARGE"]
discovery_context = "deep_exploration"
persistence = true

[[lore_fragment]]
id = "pre_collapse_city"
category = "location_lore"
rarity = "uncommon"
faction_source = "free_humanity"
title_template = "The Ruins of {city_name}"
content_template = "Before the Collapse, {city_name} was home to {population_estimate} souls. Now its towers are nesting grounds for chitin-rats and its subways are vampire highways. The settlement council has forbidden excavation of the lower districts — too many expeditions have vanished into the dark. But the old-world treasures down there are worth any risk."
discovery_tags = ["HUMAN", "PRE_COLLAPSE"]
discovery_context = "ruin_exploration"
persistence = true

[[lore_fragment]]
id = "sanguine_manor_lore"
category = "location_lore"
rarity = "uncommon"
faction_source = "sanguine_elite"
title_template = "House {house_name} Manor: Architectural Notes"
content_template = "The manor of House {house_name} was built on the foundations of a pre-Collapse data center. The upper floors imitate human nobility — chandeliers, ballrooms, silk drapes. The basement levels are something else entirely: chitin-lined incubation chambers, telomerase refinement labs, and the feeding halls where the Family gathers. Guests are not invited to the basement."
discovery_tags = ["SANGUINE", "DECEPTIVE", "SOCIAL"]
discovery_context = "manor_exploration"
persistence = true

# ─── CREATURE LORE ─────────────────────────────────────────────────────────

[[lore_fragment]]
id = "carapace_lifecycle"
category = "creature_lore"
rarity = "epic"
faction_source = "great_carapace"
title_template = "The Carapace Lifecycle: From Spawn to Old One"
content_template = "The Carapace begins as a larval spawn no larger than a human hand, hatched in the warm organic slurry of a broodmother's gestation chamber. Those that survive the first molt — and most do not — grow shells, limbs, and hunger. Each molt adds mass, density, and a new set of instincts. An Old One has molted hundreds of times. It has forgotten it was ever small."
discovery_tags = ["CARAPACE", "REPRODUCTIVE", "LARGE"]
discovery_context = "broodmother_encounter"
persistence = true

[[lore_fragment]]
id = "vampire_biology"
category = "creature_lore"
rarity = "rare"
faction_source = "sanguine_elite"
title_template = "The Hybrid Condition: A Self-Study by House {house_name}"
content_template = "The Hybrid body exists in a state of controlled instability. The Carapace telomerase prevents aging, but it also demands constant hemoprotein catalysis — human blood. Without it, the enzyme crystallizes in the bloodstream. The result is a systemic cascade failure: organs calcify, chitin subdermal plates grow inward, and the Hybrid dissolves from within. The process takes three days. It is not painless."
discovery_tags = ["SANGUINE", "SANGUIVORE", "HAS_CHITIN"]
discovery_context = "sanguine_conversation"
persistence = true

[[lore_fragment]]
id = "familiar_collapse"
category = "creature_lore"
rarity = "uncommon"
faction_source = "familiars"
title_template = "The Stages of Withdrawal"
content_template = "Stage One: craving. The familiar thinks about the Enzyme constantly. Stage Two: tremor. The hands shake, the vision blurs, the genetic code begins to protest. Stage Three: the Screaming. The familiar's own cells recognize they have been abandoned by the telomerase that sustained them. Stage Four: reversion. The body begins producing its own corrupted enzyme, and the familiar becomes something that no longer needs to speak."
discovery_tags = ["FAMILIAR", "ADDICTED", "WITHDRAWAL"]
discovery_context = "withdrawal_observation"
persistence = true

[[lore_fragment]]
id = "construct_origin"
category = "creature_lore"
rarity = "rare"
faction_source = "ancient_machines"
title_template = "Archival Log {log_id}: Autonomous Systems Activation Protocol"
content_template = "AUTOMATED SYSTEMS DIRECTIVE: Protect civilian infrastructure. Preserve human life. Restore order following civil emergency. NOTE: The civil emergency is now one hundred and twelve years old. Power reserves at 23%. Civilian life detected: minimal. Restore order directive: impossible. Continue patrol. Continue patrol. Continue— {log_corruption} —patrol."
discovery_tags = ["CONSTRUCT", "MINDLESS", "PRE_COLLAPSE"]
discovery_context = "construct_examination"
persistence = true

[[lore_fragment]]
id = "mutant_origin_bombardier"
category = "creature_lore"
rarity = "uncommon"
faction_source = "mutated_wildlife"
title_template = "Bombardier Hog: Case Study in Uncontrolled Splicing"
content_template = "The Bombardier Hog is not a natural species. It is the result of a Carapace juvenile consuming a wild boar and failing to digest it fully. The horizontal gene transfer backfired — the boar's cells absorbed Carapace heat-gland DNA and survived. The resulting creature is a perfect accident: a mammal that sprays boiling enzyme at predators. Nature did not design this. The Trench did."
discovery_tags = ["MUTANT", "EXOTHERMIC_SPRAY", "BEAST"]
discovery_context = "beast_examination"
persistence = true

