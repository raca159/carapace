[[lore_fragment]]
id = "the_bioweapon_theory"
category = "ancient_event"
rarity = "legendary"
faction_source = "sanguine_elite"
title_template = "The Bioweapon Theory (Suppressed)"
content_template = "Some among the Elite believe the Collapse was not an accident. The Carapace gene — the horizontal gene transfer mechanism — was weaponized. It was engineered to jump species, to spread, to convert. The question is: who fired it? And if they did, what were they trying to stop that required the transformation of all life on Earth?"
discovery_tags = ["SANGUINE", "DECEPTIVE", "PRE_COLLAPSE"]
discovery_context = "elite_inner_circle"
persistence = true

[[lore_fragment]]
id = "the_last_transmission"
category = "ancient_event"
rarity = "legendary"
faction_source = "ancient_machines"
title_template = "Archival Log {log_id}: Final Planetary Communication"
content_template = "This is the last recorded broadcast before global communications ceased: '—repeat, this is Unified Command to any surviving station. The quarantine has failed. The —signal breaking up— not a natural pathogen. It is— {transmission_garbling} —deliberate. If you receive this: do not approach the Trenches. Do not consume animal products. And for the love of God, do not—' Transmission ends. No further data."
discovery_tags = ["CONSTRUCT", "PRE_COLLAPSE", "ARTIFACT"]
discovery_context = "deep_vault_discovery"
persistence = true

[[lore_fragment]]
id = "the_elder_things"
category = "ancient_event"
rarity = "epic"
faction_source = "great_carapace"
title_template = "What the Old Ones Remember"
content_template = "The oldest Carapace — the ones that have molted so many times their shells are thicker than concrete and their minds are no longer recognizable — remember a time before humans. They remember when the Trenches were open air and the sky was a different color. They do not remember the Collapse because to them, it was Tuesday. They have seen civilizations rise and fall like tide cycles. They out-wait everything."
discovery_tags = ["CARAPACE", "LARGE", "IMMORTAL"]
discovery_context = "old_one_encounter"
persistence = true

[[lore_fragment]]
id = "the_burning_of_sector_7"
category = "ancient_event"
rarity = "rare"
faction_source = "free_humanity"
title_template = "The Burning of {settlement_name}"
content_template = "The night the Familiars breached the outer wall, {settlement_name} burned for three days. Not from fire — from enzyme. The cultists had been hoarding raw telomerase, and when the defense towers collapsed, the storage vats ruptured. The enzyme did not burn. It dissolved. Everything organic within the walls dissolved into a nutrient slurry. The Carapace arrived a week later to feed. The settlement is now a spawning ground."
discovery_tags = ["HUMAN", "FAMILIAR"]
discovery_context = "refugee_dialogue"
persistence = true

