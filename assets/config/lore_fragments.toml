[[lore_fragment]]
id = "the_last_garden"
category = "ancient_event"
rarity = "legendary"
faction_source = "free_humanity"
title_template = "The Last Garden: {settlement_name}"
content_template = "Before the Collapse, {settlement_name} was an agricultural research station. The seeds are still there — locked in a climate-controlled vault that has somehow maintained power for over a century. The crops outside have long since mutated, turned carnivorous, or died. But inside the vault, untouched by the Enzyme: wheat. Corn. Potatoes. The old world's last meal, waiting for someone who knows how to plant it."
discovery_tags = ["HUMAN", "PRE_COLLAPSE"]
discovery_context = "vault_discovery"
persistence = true
