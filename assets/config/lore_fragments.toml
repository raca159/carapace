faction_source = "ancient_machines"
title_template = "Deflector Shield Generator: Field Test Report"
content_template = "The Mark II personal deflector generates a localized kinetic barrier effective against projectiles up to 7.62mm. DURATION: 45 seconds continuous. RECHARGE: 120 seconds from full discharge. LIMITATION: Does not protect against melee, biological acids, or ideological conviction. TESTER NOTE: 'It saved my life three times. The fourth time, the battery died.'"
discovery_tags = ["ARTIFACT", "ENERGY", "RARE", "PRE_COLLAPSE"]
