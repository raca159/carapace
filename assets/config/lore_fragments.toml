title_template = "Swarm Intelligence in Telomerase-Accelerated {animal_type} Populations"
content_template = "We have observed a phenomenon the settlement hunters call 'the Glimmer.' When enough {animal_type} cluster in a telomerase-rich environment, their individual nervous systems begin to synchronize. They share pain. They share intent. They act as a single organism distributed across many bodies. The Glimmer does not think — it reacts. And it reacts to threats with the precision of something that has a thousand eyes and a thousand mouths."
