title_template = "Operational Guide: Gene-Splicing Pod Mark VII"
content_template = "The Mark VII Gene-Splicing Pod accepts viable tissue samples and integrates foreign genetic material into the host genome. SUCCESS RATE: 67% in controlled trials. REJECTION RATE: 31% (fatal within 72 hours). NOTE: The pod was designed for medical therapy, not {species_name} gene integration. The original designers did not account for chitinous tissue. Use at your own risk."
discovery_tags = ["CONSTRUCT", "PRE_COLLAPSE", "ARTIFACT"]
discovery_context = "machine_interaction"
persistence = true

