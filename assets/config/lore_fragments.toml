category = "creature_lore"
rarity = "epic"
faction_source = "mutated_wildlife"
title_template = "Unidentified Species: Provisional Designation 'Bone Weaver'"
content_template = "A Carapace variant that does not consume its prey — it incorporates them. The Bone Weaver drags carcasses to a central nest and uses enzyme-thread to stitch skeletons into structural formations. The resulting 'architecture' is non-functional, decorative, and deeply unsettling. Purpose unknown. Possibly aesthetic. Possibly ritual. The Carapace were not observed to have culture. This observation challenges that assumption."
