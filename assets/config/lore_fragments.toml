# Lore Fragments — Carapace Procedural World Lore
#
# Discoverable lore entries that persist across sessions.
# Each fragment has a content template, discovery conditions,
# rarity, and faction perspective.
#
# The LLM narrative layer renders these into player-readable lore
# when triggered by world state, NPC dialogue, or artifact examination.
#
# Template variable syntax: {variable_name}
# Rarity affects discovery probability: common > uncommon > rare > epic > legendary
# Fractions of factions are the narrative source (bias is intentional — lens 10).

# ─── WORLD HISTORY — The Collapse ──────────────────────────────────────────

[[lore_fragment]]
id = "the_great_collapse"
category = "world_history"
rarity = "common"
faction_source = "free_humanity"
title_template = "The Great Collapse"
content_template = "No one agrees on what caused the Fall. Some say the machines rebelled. Some say a plague that rewrote the very code of life. A few whisper that we were not the first to fall, and will not be the last. What remains: ash, ruins, and the things that crawl between them."
discovery_tags = ["HUMAN"]
discovery_context = "dialogue_with_elder"
persistence = true

[[lore_fragment]]
id = "the_compact_of_blood"
category = "world_history"
rarity = "rare"
faction_source = "sanguine_elite"
title_template = "The Compact of Blood"
content_template = "Before the Collapse, a geneticist named {scientist_name} discovered the Carapace in a deep-ocean trench. The first Hybrids were volunteers — dying soldiers who chose to become something more. They got their wish. They became predators. And the world became prey."
discovery_tags = ["SANGUINE", "DECEPTIVE"]
discovery_context = "vampire_confession"
persistence = true

[[lore_fragment]]
id = "the_telomerase_breakthrough"
category = "world_history"
rarity = "epic"
faction_source = "ancient_machines"
title_template = "Archival Log {log_id}: Telomerase Research Initiative"
content_template = "PROJECT: Phoenix. OBJECTIVE: Develop stable telomerase synthesis for military longevity. STATUS: Phase 3 trials successful. SUBJECT: Human volunteers achieved 300% telomerase extension without malignant transformation. NOTE: Long-term psychological effects unstudied. WARNNOTES: Subject 47 displayed increased aggression, reduced empathy, dietary preference for hemoprotein. Recommendation: Continue observation."
discovery_tags = ["CONSTRUCT", "PRE_COLLAPSE"]
discovery_context = "artifact_scan"
persistence = true

[[lore_fragment]]
id = "cryogen_fleet_manifest"
category = "world_history"
rarity = "legendary"
faction_source = "ancient_machines"
title_template = "Archival Log {log_id}: Civilian Cryogenic Manifest — Sector {sector_id}"
content_template = "VAULT DESIGNATION: {vault_id}. STATUS: Operational — 847 pods occupied. ESTIMATED THAW DATE: 01-JAN-2105 or upon atmospheric stabilization. NOTE: Life support for 847 occupants for 120 years confirmed. — No further contact after 03-MAR-2098. Facility automated systems continue protocol. The sleepers wait."
discovery_tags = ["CRYO_REMNANT", "CONSTRUCT"]
discovery_context = "vault_discovery"
persistence = true

# ─── FACTON HISTORY ────────────────────────────────────────────────────────

[[lore_fragment]]
id = "carapace_origin"
category = "faction_lore"
rarity = "rare"
faction_source = "great_carapace"
title_template = "The Trenches: A Carapace Brood-Chronicle"
content_template = "The Great Carapace has no language. It speaks in pheromone clouds, chitin frequencies, and the arrangement of molted shells in the deep dark. But patterns emerge: the old ones grow shells inscribed with the chemical signatures of every brood they have devoured. Their history is written in calcium carbonate and digestive enzymes."
discovery_tags = ["CARAPACE", "AQUATIC", "LARGE"]
discovery_context = "trench_exploration"
persistence = true

[[lore_fragment]]
id = "sanguine_houses"
category = "faction_lore"
rarity = "uncommon"
faction_source = "sanguine_elite"
title_template = "The Blood Houses of House {house_name}"
content_template = "The Sanguine Elite are not a monolith. House {house_name} claims descent from the original Hybrid Compact; House {rival_house} insists the Compact was a myth and their founder was the first true vampire. They have been killing each other over this theological dispute for seventy years. Both are correct. Neither will admit it."
discovery_tags = ["SANGUINE", "SOCIAL"]
discovery_context = "vampire_politics"
persistence = true

[[lore_fragment]]
id = "familiar_origin_cult"
category = "faction_lore"
rarity = "uncommon"
faction_source = "familiars"
title_template = "The First Communion: A Catechism of the Enzyme"
content_template = "The First Familiar was a miner named {cult_founder}, trapped for three weeks in a collapsed trench shaft. When they found her, she had survived by drinking from the severed limb of a Carapace juvenile. She did not die. She did not stay human. She founded the first cult. The rest of us are just following her example."
discovery_tags = ["FAMILIAR", "ZEALOT"]
discovery_context = "cult_ritual"
persistence = true

[[lore_fragment]]
id = "free_human_settlements"
category = "faction_lore"
rarity = "common"
faction_source = "free_humanity"
title_template = "The {settlement_name} Compact"
content_template = "The settlements survive by a simple rule: walls, water, and watch. Each settlement maintains a mutual-defense pact with its neighbors — when the night-hunters come, the signal fires light the chain from {settlement_name} to {neighbor_settlement}. The system has failed three times. Three settlements are now ash."
discovery_tags = ["HUMAN", "TERRITORIAL"]
discovery_context = "settlement_conversation"
persistence = true

[[lore_fragment]]
id = "mutant_ecology"
category = "faction_lore"
rarity = "uncommon"
faction_source = "mutated_wildlife"
title_template = "Telomerase Spill Effects: Third-Generation Wildlife"
content_template = "The wildlife near the Trench spill-zones has begun showing {mutation_type}. Chitin plating on mammals. Electric organs in fish. A {animal_type} was recently found with functional chromatophores — it did not exist in the pre-Collapse biosphere. The telomerase is not corrupting life. It is accelerating it. Speeding up evolution until something breaks."
discovery_tags = ["MUTANT", "FERAL", "HAS_CHITIN"]
discovery_context = "beast_dissection"
persistence = true

