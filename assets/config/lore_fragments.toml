category = "faction_lore"
rarity = "uncommon"
faction_source = "the_remnant"
title_template = "Archival Log {log_id}: Genetic Diversity Report — Bunker {vault_id}"
content_template = "STATUS: Critically low. The founding population of 247 has inbred across six generations. Congenital defects affect 68% of live births. The bunker's gene-therapy equipment failed in year 14. We have attempted hybridization with surface survivors, but the surface genome has been corrupted by telomerase exposure. Our children are born brittle. Their bones cannot support the weight of the world above."
discovery_tags = ["HUMAN", "PRE_COLLAPSE"]
discovery_context = "remnant_conversation"
persistence = true

[[lore_fragment]]
id = "remnant_first_contact"
category = "world_history"
rarity = "legendary"
faction_source = "the_remnant"
title_template = "The Surface: First Contact Assessment"
content_template = "BUNKER {vault_id} SURFACE TEAM: We opened the hatch on day 14,273. The sky was the color of old bruises. The air was breathable but carried a chemical sweetness we could not identify. We encountered 'settlers' who claimed the world ended 'generations ago.' They asked if we were 'pure.' We did not understand the question. Then we met the things that hunt at night. We understand now."
discovery_tags = ["HUMAN", "PRE_COLLAPSE", "RARE"]
discovery_context = "remnant_confession"
persistence = true

[[lore_fragment]]
id = "remnant_tech_superiority"
category = "faction_lore"
rarity = "uncommon"
faction_source = "the_remnant"
title_template = "Field Report: Technology Disparity"
content_template = "The surface dwellers have forgotten everything. They call a plasma cutter a 'fire knife.' They believe the old world's machines are magic. They do not know how to maintain, calibrate, or manufacture any pre-Collapse technology. They scavenge what we keep in working order. We are not stronger than them. We did not survive better. We simply remembered how to read the manuals."
discovery_tags = ["CONSTRUCT", "PRE_COLLAPSE", "HUMAN"]
discovery_context = "remnant_trade"
persistence = true

